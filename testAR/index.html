<!DOCTYPE html>
 <html lang="vi">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
 <title>Sửa Lỗi Chụp Ảnh WebAR - Gộp Camera Thành Công</title>
 <style>
 body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; background-color: #000; }
 /* Video camera thực tế nằm ở dưới cùng */
 #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
 /* Canvas chứa vật thể 3D đè lên trên và có nền trong suốt */
 #threejs-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: auto; }

 #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; width: 100%; }
 #snap-btn { width: 75px; height: 75px; border-radius: 50%; background: white; border: 5px solid #007bff; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
 #snap-btn:active { background: #ddd; }
 #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; background: rgba(0,0,0,0.6); padding: 8px 0; z-index: 10; font-size: 14px; }
 </style>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
 </head>
 <body>

 <div id="info">Đang khởi tạo Camera... Chạm màn hình để đặt khối hộp.</div>

 <video id="webcam" autoplay playsinline muted></video>

 <canvas id="threejs-canvas"></canvas>

 <div id="controls">
 <button id="snap-btn" title="Chụp ảnh ngay"></button>
 </div>

 <script>
 const video = document.getElementById('webcam');
 const canvas3D = document.getElementById('threejs-canvas');
 const infoDiv = document.getElementById('info');
 const snapBtn = document.getElementById('snap-btn');

 let scene, camera, renderer, cube;

 // BƯỚC 1: Mở camera thực tế của điện thoại làm nền
 async function setupCamera() {
 try {
 const stream = await navigator.mediaDevices.getUserMedia({
 video: { facingMode: { exact: "environment" } }, // Ưu tiên camera sau
 audio: false
 });
 video.srcObject = stream;
 } catch (err) {
 console.warn("Không tìm thấy camera sau mặc định, thử gọi camera bất kỳ:", err);
 try {
 const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
 video.srcObject = fallbackStream;
 } catch (e) {
 infoDiv.innerText = "Lỗi: Không thể truy cập Camera. Hãy bật quyền HTTPS.";
 }
 }
 }

 // BƯỚC 2: Khởi tạo không gian 3D đè lên camera (nền trong suốt)
 function init3D() {
 scene = new THREE.Scene();

 camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
 camera.position.set(0, 0, 5); // Đặt camera cách tâm tọa độ

 // Cấu hình WebGLRenderer có thuộc tính alpha và preserveDrawingBuffer để chụp không bị đen/trắng
 renderer = new THREE.WebGLRenderer({ 
 canvas: canvas3D, 
 alpha: true, 
 antialias: true,
 preserveDrawingBuffer: true 
 });
 renderer.setSize(window.innerWidth, window.innerHeight);
 renderer.setPixelRatio(window.devicePixelRatio);

 // Thêm ánh sáng
 const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
 scene.add(ambientLight);
 const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
 dirLight.position.set(10, 20, 15);
 scene.add(dirLight);

 // Tạo sẵn một khối hộp mẫu (đại diện cho Pokemon)
 const geometry = new THREE.BoxGeometry(1, 1, 1);
 const material = new THREE.MeshPhongMaterial({ color: 0xff3838 });
 cube = new THREE.Mesh(geometry, material);
 cube.position.set(0, 0, 0);
 scene.add(cube);

 // Sự kiện chạm màn hình để di chuyển vật thể đến điểm chạm
 window.addEventListener('pointerdown', (event) => {
 // Đưa vật thể ngẫu nhiên dịch chuyển để tạo cảm giác tương tác AR
 cube.position.x = (event.clientX / window.innerWidth) * 4 - 2;
 cube.position.y = -(event.clientY / window.innerHeight) * 4 + 2;
 infoDiv.innerText = "Đã di chuyển vật thể! Nhấn nút bên dưới để chụp.";
 });

 window.addEventListener('resize', onWindowResize);
 animate();
 }

 function onWindowResize() {
 camera.aspect = window.innerWidth / window.innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(window.innerWidth, window.innerHeight);
 }

 function animate() {
 requestAnimationFrame(animate);
 // Cho khối hộp tự xoay nhẹ để nhận biết không phải ảnh tĩnh
 if(cube) {
 cube.rotation.x += 0.01;
 cube.rotation.y += 0.01;
 }
 renderer.render(scene, camera);
 }

 // BƯỚC 3: THUẬT TOÁN GỘP 2 CANVAS - SỬA LỖI TRẮNG XÓA
 function takeSnapshot() {
 infoDiv.innerText = "Đang xử lý ảnh...";

 // Tạo một canvas ẩn để gộp hình ảnh
 const mergedCanvas = document.createElement('canvas');
 mergedCanvas.width = renderer.domElement.width;
 mergedCanvas.height = renderer.domElement.height;
 const ctx = mergedCanvas.getContext('2d');

 // 1. Vẽ hình ảnh từ video camera thật vào trước (Làm hình nền)
 // Tính toán tỷ lệ để video không bị méo (Object-fit cover giả lập)
 const videoRatio = video.videoWidth / video.videoHeight;
 const canvasRatio = mergedCanvas.width / mergedCanvas.height;
 let sx, sy, sw, sh;

 if (videoRatio > canvasRatio) {
 sh = video.videoHeight;
 sw = sh * canvasRatio;
 sx = (video.videoWidth - sw) / 2;
 sy = 0;
 } else {
 sw = video.videoWidth;
 sh = sw / canvasRatio;
 sx = 0;
 sy = (video.videoHeight - sh) / 2;
 }
 ctx.drawImage(video, sx, sy, sw, sh, 0, 0, mergedCanvas.width, mergedCanvas.height);

 // 2. Vẽ đè canvas 3D (vật thể) lên trên nền vừa chụp
 ctx.drawImage(canvas3D, 0, 0, mergedCanvas.width, mergedCanvas.height);

 // 3. Xuất file ảnh cuối cùng
 try {
 const dataURL = mergedCanvas.toDataURL('image/png');
 const link = document.createElement('a');
 link.download = 'ar_pokemon_success.png';
 link.href = dataURL;
 link.click();
 infoDiv.innerText = "Đã chụp và tải ảnh thành công!";
 } catch (error) {
 console.error(error);
 infoDiv.innerText = "Lỗi xuất ảnh bảo mật (CORS).";
 }
 }

 snapBtn.addEventListener('click', takeSnapshot);

 // Chạy hệ thống
 setupCamera().then(init3D);
 </script>
 </body>
 </html>
