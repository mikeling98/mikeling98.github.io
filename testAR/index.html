<!DOCTYPE html>
 <html lang="vi">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
 <title>Sửa Lỗi Trắng Xóa WebAR</title>
 <style>
 body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
 #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
 #threejs-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
 #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 10; }
 #snap-btn { width: 75px; height: 75px; border-radius: 50%; background: white; border: 5px solid #ff4757; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
 #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; background: rgba(0,0,0,0.7); padding: 8px 0; z-index: 10; font-size: 13px; }
 </style>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
 </head>
 <body>

 <div id="info">Đang kết nối camera an toàn... Chạm màn hình để đổi màu khối hộp.</div>
 <video id="webcam" autoplay playsinline muted></video>
 <canvas id="threejs-canvas"></canvas>

 <div id="controls">
 <button id="snap-btn"></button>
 </div>

 <script>
 const video = document.getElementById('webcam');
 const canvas3D = document.getElementById('threejs-canvas');
 const infoDiv = document.getElementById('info');
 const snapBtn = document.getElementById('snap-btn');

 let scene, camera, renderer, mesh;
 let videoTrack = null; // Lưu trữ luồng camera gốc

 async function initCamera() {
 try {
 const constraints = {
 video: { facingMode: { exact: "environment" } },
 audio: false
 };
 const stream = await navigator.mediaDevices.getUserMedia(constraints);
 video.srcObject = stream;
 videoTrack = stream.getVideoTracks()[0];
 } catch (err) {
 // Thử lại với camera bất kỳ nếu không ép được camera sau
 const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
 video.srcObject = stream;
 videoTrack = stream.getVideoTracks()[0];
 }
 }

 function init3D() {
 scene = new THREE.Scene();
 camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
 camera.position.z = 3;

 // BẬT preserveDrawingBuffer để bảo toàn dữ liệu vẽ 3D
 renderer = new THREE.WebGLRenderer({ 
 canvas: canvas3D, 
 alpha: true, 
 antialias: true,
 preserveDrawingBuffer: true 
 });
 renderer.setSize(window.innerWidth, window.innerHeight);
 renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

 // Tạo vật thể
 const geometry = new THREE.BoxGeometry(1, 1, 1);
 const material = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: false });
 mesh = new THREE.Mesh(geometry, material);
 scene.add(mesh);

 // Chạm màn hình đổi màu vật thể để kiểm tra tính động
 window.addEventListener('pointerdown', () => {
 mesh.material.color.setHex(Math.random() * 0xffffff);
 });

 animate();
 }

 function animate() {
 requestAnimationFrame(animate);
 if (mesh) {
 mesh.rotation.x += 0.01;
 mesh.rotation.y += 0.01;
 }
 renderer.render(scene, camera);
 }

 // GIẢI PHÁP SỬA LỖI TRẮNG XÓA: Sử dụng phương pháp chuyển đổi Blob trực tiếp
 async function captureSnapshot() {
 infoDiv.innerText = "Đang xử lý ảnh chống chặn bảo mật...";

 const mergedCanvas = document.createElement('canvas');
 mergedCanvas.width = renderer.domElement.width;
 mergedCanvas.height = renderer.domElement.height;
 const ctx = mergedCanvas.getContext('2d');

 // Mẹo vượt rào bảo mật: Vẽ video thông qua việc kiểm tra trạng thái sẵn sàng
 if (video.readyState === video.HAVE_ENOUGH_DATA) {
 // Vẽ ảnh nền từ video camera
 ctx.drawImage(video, 0, 0, mergedCanvas.width, mergedCanvas.height);

 // Vẽ đè phần 3D lên
 ctx.drawImage(canvas3D, 0, 0, mergedCanvas.width, mergedCanvas.height);

 // Chuyển thành Blob thay vì DataURL để tránh lỗi chuỗi trắng mã hóa cơ sở
 mergedCanvas.toBlob((blob) => {
 if (blob === null) {
 infoDiv.innerText = "Lỗi: Trình duyệt không xuất được Blob.";
 return;
 }
 const url = URL.createObjectURL(blob);
 const link = document.createElement('a');
 link.download = 'pokemon_ar_fixed.png';
 link.href = url;
 link.click();

 // Giải phóng bộ nhớ ảo
 setTimeout(() => URL.revokeObjectURL(url), 100);
 infoDiv.innerText = "Đã chụp thành công! Kiểm tra album ảnh.";
 }, 'image/png');
 } else {
 infoDiv.innerText = "Camera chưa sẵn sàng dữ liệu hình ảnh.";
 }
 }

 snapBtn.addEventListener('click', captureSnapshot);

 window.addEventListener('resize', () => {
 camera.aspect = window.innerWidth / window.innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(window.innerWidth, window.innerHeight);
 });

 initCamera().then(init3D);
 </script>
 </body>
 </html>
