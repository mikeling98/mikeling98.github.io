<!DOCTYPE html>
 <html lang="vi">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
 <title>WebAR - Vượt rào khóa quyền Pixel</title>
 <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
 <style>
 body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
 #controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; }
 #snap-btn { width: 75px; height: 75px; border-radius: 50%; background: white; border: 5px solid #007bff; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
 #info { position: fixed; top: 10px; width: 100%; text-align: center; color: white; background: rgba(0,0,0,0.7); padding: 8px 0; z-index: 9999; font-size: 13px; }
 </style>
 </head>
 <body>

 <div id="info">Đang kết nối camera phần cứng... Chạm màn hình để đặt vật thể.</div>
 <div id="controls"><button id="snap-btn"></button></div>

 <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/examples/image-tracking/assets/card-example/card.mind; autoStart: true;" embedded renderer="preserveDrawingBuffer: true; alpha: true;">
 <a-camera position="0 0 0" look-controls="enabled: true"></a-camera>
 <a-entity id="ar-objects-container"></a-entity>
 </a-scene>

 <script>
 const infoDiv = document.getElementById('info');
 const snapBtn = document.getElementById('snap-btn');
 const objectsContainer = document.getElementById('ar-objects-container');
 const sceneEl = document.querySelector('a-scene');
 let imageCapture = null;

 // Lấy luồng camera trực tiếp từ phần cứng để chuẩn bị chụp gốc
 sceneEl.addEventListener("arReady", () => {
 infoDiv.innerText = "Hệ thống sẵn sàng! Chạm để đặt vật thể.";
 const videoTrack = document.querySelector('video').srcObject.getVideoTracks()[0];
 // Kích hoạt API ImageCapture trực tiếp từ phần cứng camera
 if (window.ImageCapture) {
 imageCapture = new ImageCapture(videoTrack);
 }
 });

 // Đặt vật thể đứng im theo con quay hồi chuyển
 window.addEventListener('click', (e) => {
 if (e.target === snapBtn) return;
 const cameraEl = document.querySelector('a-camera');
 const rotation = cameraEl.getAttribute('rotation');
 const position = cameraEl.getAttribute('position');

 const angleY = (rotation.y * Math.PI) / 180;
 const angleX = (rotation.x * Math.PI) / 180;
 const distance = 2;

 const targetX = position.x - Math.sin(angleY) * Math.cos(angleX) * distance;
 const targetZ = position.z - Math.cos(angleY) * Math.cos(angleX) * distance;
 const targetY = position.y + Math.sin(angleX) * distance;

 const sphere = document.createElement('a-sphere');
 sphere.setAttribute('position', `${targetX} ${targetY} ${targetZ}`);
 sphere.setAttribute('radius', '0.15');
 sphere.setAttribute('color', '#' + Math.floor(Math.random()*16777215).toString(16));
 objectsContainer.appendChild(sphere);
 });

 // CHỤP ẢNH PHẦN CỨNG (Sửa triệt để lỗi khóa quyền pixel)
 snapBtn.addEventListener('click', async () => {
 infoDiv.innerText = "Đang chụp từ phần cứng camera...";
 const threeCanvas = sceneEl.renderer.domElement;

 const mergedCanvas = document.createElement('canvas');
 mergedCanvas.width = threeCanvas.width;
 mergedCanvas.height = threeCanvas.height;
 const ctx = mergedCanvas.getContext('2d');

 try {
 if (imageCapture) {
 // Bước 1: Chụp một bức ảnh thực tế từ camera bằng phần cứng (không qua canvas)
 const imageBitmap = await imageCapture.grabFrame();
 ctx.drawImage(imageBitmap, 0, 0, mergedCanvas.width, mergedCanvas.height);
 } else {
 // Nếu trình duyệt không hỗ trợ ImageCapture, ép vẽ video dạng tối giản chống bộ lọc
 ctx.drawImage(document.querySelector('video'), 0, 0, mergedCanvas.width, mergedCanvas.height);
 }

 // Bước 2: Vẽ đè vật thể 3D lên
 ctx.drawImage(threeCanvas, 0, 0, mergedCanvas.width, mergedCanvas.height);

 // Bước 3: Xuất file ảnh
 mergedCanvas.toBlob((blob) => {
 const url = URL.createObjectURL(blob);
 const link = document.createElement('a');
 link.download = 'webar_hardware_snapshot.png';
 link.href = url;
 link.click();
 infoDiv.innerText = "Chụp thành công nhờ ImageCapture API!";
 }, 'image/png');

 } catch (error) {
 console.error(error);
 infoDiv.innerText = "Trình duyệt khóa quá chặt. Hãy chuyển sang Phương pháp 2 (Mở tab mới).";
 }
 });
 </script>
 </body>
 </html>
