<!DOCTYPE html>
 <html lang="vi">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>MindAR - Quét mặt phẳng & Chụp ảnh gộp nền</title>
 <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
 <style>
 body { margin: 0; overflow: hidden; }
 #snap-btn {
 position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
 width: 70px; height: 70px; border-radius: 50%; background: white;
 border: 5px solid #ff4757; z-index: 9999; cursor: pointer;
 }
 </style>
 </head>
 <body>

 <div id="snap-btn"></div>

 <a-scene mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/examples/image-tracking/assets/card-example/card.mind;" color-space="sRGB" renderer="colorManagement: true, preserveDrawingBuffer: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
 <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

 <a-entity mindar-image-target="targetIndex: 0">
 <a-gltf-model rotation="0 0 0" position="0 0 0" scale="0.05 0.05 0.05" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"></a-gltf-model>
 </a-entity>
 </a-scene>

 <script>
 document.getElementById('snap-btn').addEventListener('click', () => {
 // Tìm thẻ định dạng cảnh của A-Frame
 const sceneEl = document.querySelector('a-scene');
 // Lấy canvas gộp cả video camera nền và vật thể 3D
 const canvas = sceneEl.components.screenshot.getCanvas('perspective');

 const link = document.createElement('a');
 link.download = 'webar-photo-complete.png';
 link.href = canvas.toDataURL('image/png');
 link.click();
 });
 </script>
 </body>
 </html>
