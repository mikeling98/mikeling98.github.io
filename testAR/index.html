<!DOCTYPE html>
 <html lang="vi">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
 <title>WebAR Hoàn Chỉnh với AR.js - Chống Lỗi Đen Ảnh</title>

 <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
 <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

 <style>
 body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }

 #controls { 
 position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
 z-index: 9999; text-align: center; width: 100%; pointer-events: none;
 }
 /* Nút bấm phải bật pointer-events để click được vì khung controls đang tắt */
 #snap-btn { 
 width: 75px; height: 75px; border-radius: 50%; background: white; 
 border: 5px solid #007bff; cursor: pointer; pointer-events: auto;
 box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
 }
 #snap-btn:active { background: #ddd; }

 #info { 
 position: fixed; top: 10px; width: 100%; text-align: center; 
 color: white; background: rgba(0,0,0,0.7); padding: 8px 0; 
 z-index: 9999; font-size: 13px; pointer-events: none;
 }
 </style>
 </head>
 <body>

 <div id="info">Đang khởi tạo AR.js... Chạm vào màn hình để đặt vật thể đứng im dưới sàn.</div>

 <div id="controls">
 <button id="snap-btn" title="Chụp ảnh ngay"></button>
 </div>

 <a-scene 
 embedded 
 arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
 screenshot
 renderer="preserveDrawingBuffer: true; alpha: true;">

 <a-entity light="type: ambient; intensity: 0.8;"></a-entity>
 <a-entity light="type: directional; intensity: 0.5;" position="1 2 1"></a-entity>

 <a-camera gps-camera rotation-reader look-controls="enabled: true"></a-camera>

 <a-entity id="pokemon-group"></a-entity>

 </a-scene>

 <script>
 const infoDiv = document.getElementById('info');
 const snapBtn = document.getElementById('snap-btn');
 const pokemonGroup = document.getElementById('pokemon-group');
 const sceneEl = document.querySelector('a-scene');

 // Chờ hệ thống AR.js và Camera sẵn sàng
 sceneEl.addEventListener('renderstart', () => {
 infoDiv.innerText = "AR.js Sẵn sàng! Hãy hướng camera xuống đất và chạm màn hình để đặt vật thể.";
 });

 // TÍNH NĂNG ĐẶT VẬT THỂ: Tính toán khoảng cách dựa trên hướng camera phóng ra
 window.addEventListener('click', (event) => {
 // Loại trừ nếu bấm trúng nút chụp ảnh
 if (event.target === snapBtn) return;

 // Lấy góc quay hiện tại của camera điện thoại ngoài đời thực
 const cameraEl = document.querySelector('a-camera');
 const cameraRotation = cameraEl.getAttribute('rotation');
 const cameraPosition = cameraEl.getAttribute('position');

 // Tính toán vị trí "dưới đất" phía trước camera khoảng 2 mét (giả lập mặt phẳng)
 const angleInRadians = (cameraRotation.y * Math.PI) / 180;
 const distance = 2; // Cách người dùng 2 mét

 const targetX = cameraPosition.x - Math.sin(angleInRadians) * distance;
 const targetZ = cameraPosition.z - Math.cos(angleInRadians) * distance;
 const targetY = cameraPosition.y - 1.2; // Đặt thấp xuống dưới tầm mắt 1.2m (Sàn nhà)

 // Tạo vật thể mới bằng thẻ A-Frame (Quả cầu 3D tương tự Pokemon)
 const newElement = document.createElement('a-sphere');
 newElement.setAttribute('position', `${targetX} ${targetY} ${targetZ}`);
 newElement.setAttribute('radius', '0.25');
 // Random màu sắc để phân biệt các vật thể
 const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
 newElement.setAttribute('color', randomColor);

 // Hiệu ứng đổ bóng cơ bản để tăng độ chân thực
 newElement.setAttribute('shadow', 'cast: true');

 // Thêm vật thể vào không gian
 pokemonGroup.appendChild(newElement);
 infoDiv.innerText = "Đã đặt vật thể! Hãy đi vòng quanh để kiểm tra độ đứng im.";
 });

 // TÍNH NĂNG CHỤP ẢNH: Sử dụng bộ gộp canvas thuần của A-Frame chống nền đen/trắng
 snapBtn.addEventListener('click', () => {
 infoDiv.innerText = "Đang gộp camera và ảnh 3D...";

 // Gọi component screenshot tích hợp sẵn của A-Frame để gộp video camera gốc và vật thể 3D
 const screenshotComponent = sceneEl.components.screenshot;

 if (screenshotComponent) {
 // Lấy canvas đã gộp góc nhìn perspective
 const captureCanvas = screenshotComponent.getCanvas('perspective');

 try {
 const dataURL = captureCanvas.toDataURL('image/png');
 const link = document.createElement('a');
 link.download = 'arjs_pokemon_snapshot.png';
 link.href = dataURL;
 link.click();
 infoDiv.innerText = "Chụp thành công! Ảnh đã được tải về máy.";
 } catch (err) {
 console.error(err);
 infoDiv.innerText = "Lỗi xuất ảnh bảo mật. Vui lòng kiểm tra lại HTTPS.";
 }
 } else {
 infoDiv.innerText = "Lỗi: Không tìm thấy module Screenshot.";
 }
 });
 </script>
 </body>
 </html>
