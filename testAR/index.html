<!DOCTYPE html>
 <html lang="vi">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>WebAR Hoàn Chỉnh - Sửa Lỗi Nền Đen</title>
 <style>
 body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
 #ar-instructions { position: absolute; top: 10px; width: 100%; text-align: center; color: white; background: rgba(0,0,0,0.6); padding: 5px 0; z-index: 10; }
 #snap-btn {
 position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
 width: 70px; height: 70px; border-radius: 50%; background: white;
 border: 5px solid #007bff; z-index: 9999; display: none; cursor: pointer;
 }
 #snap-btn:active { background: #ccc; }
 </style>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
 </head>
 <body>

 <div id="ar-instructions">Đang tải hệ thống AR...</div>
 <button id="snap-btn" title="Chụp ảnh"></button>

 <script type="module">
 import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

 let camera, scene, renderer, reticle;
 let hitTestSource = null;
 let hitTestSourceRequested = false;
 let shouldTakeSnapshot = false; // Cờ đánh dấu khi ấn chụp

 const insDiv = document.getElementById('ar-instructions');
 const snapBtn = document.getElementById('snap-btn');

 function init() {
 scene = new THREE.Scene();
 camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

 // Cấu hình QUAN TRỌNG để không bị đen màn hình khi chụp
 renderer = new THREE.WebGLRenderer({ 
 antialias: true, 
 alpha: true, 
 preserveDrawingBuffer: true // Giữ lại hình ảnh trong bộ nhớ đệm
 });
 renderer.setPixelRatio(window.devicePixelRatio);
 renderer.setSize(window.innerWidth, window.innerHeight);
 renderer.xr.enabled = true;
 document.body.appendChild(renderer.domElement);

 // Khởi tạo nút AR chuẩn của trình duyệt
 const arButton = ARButton.createButton(renderer, { 
 requiredFeatures: ['hit-test'],
 optionalFeatures: ['dom-overlay'],
 domOverlay: { root: document.body }
 });
 document.body.appendChild(arButton);

 arButton.addEventListener('click', () => {
 insDiv.innerText = "Hãy di chuyển camera để quét mặt phẳng (sàn nhà/mặt bàn)...";
 snapBtn.style.display = 'block';
 });

 // Vòng tròn định vị mặt phẳng
 reticle = new THREE.Mesh(
 new THREE.RingGeometry(0.1, 0.13, 32).rotateX(-Math.PI / 2),
 new THREE.MeshBasicMaterial({ color: 0x00ff00 })
 );
 reticle.matrixAutoUpdate = false;
 reticle.visible = false;
 scene.add(reticle);

 // Ánh sáng
 const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
 scene.add(light);

 // Đặt vật thể khi chạm màn hình
 const controller = renderer.xr.getController(0);
 controller.addEventListener('select', onSelect);
 scene.add(controller);

 window.addEventListener('resize', onWindowResize);
 renderer.setAnimationLoop(render);
 }

 function onSelect() {
 if (reticle.visible) {
 // Tạo một hình cầu màu vàng (giống bóng Pokemon) để test tránh lỗi file 3D
 const geometry = new THREE.SphereGeometry(0.1, 32, 32);
 const material = new THREE.MeshPhongMaterial({ color: 0xffcc00 });
 const mesh = new THREE.Mesh(geometry, material);

 reticle.matrix.decompose(mesh.position, mesh.quaternion, mesh.scale);
 scene.add(mesh);
 insDiv.innerText = "Đã đặt vật thể! Nhấn nút tròn để chụp ảnh.";
 }
 }

 function onWindowResize() {
 camera.aspect = window.innerWidth / window.innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(window.innerWidth, window.innerHeight);
 }

 function render(timestamp, frame) {
 if (frame) {
 const referenceSpace = renderer.xr.getReferenceSpace();
 const session = renderer.xr.getSession();

 if (hitTestSourceRequested === false) {
 session.requestReferenceSpace('viewer').then((viewerSpace) => {
 session.requestHitTestSource({ space: viewerSpace }).then((source) => {
 hitTestSource = source;
 });
 });
 session.addEventListener('end', () => {
 hitTestSourceRequested = false;
 hitTestSource = null;
 snapBtn.style.display = 'none';
 insDiv.innerText = "Đã thoát AR";
 });
 hitTestSourceRequested = true;
 }

 if (hitTestSource) {
 const hitTestResults = frame.getHitTestResults(hitTestSource);
 if (hitTestResults.length) {
 const hit = hitTestResults[0];
 reticle.visible = true;
 reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
 } else {
 reticle.visible = false;
 }
 }
 }

 // Vẽ toàn bộ khung cảnh lên màn hình
 renderer.render(scene, camera);

 // SỬA LỖI NỀN ĐEN: Chụp ảnh NGAY TRONG LÚC ĐANG RENDER KHUNG HÌNH
 if (shouldTakeSnapshot) {
 shouldTakeSnapshot = false; // Reset cờ
 try {
 const dataURL = renderer.domElement.toDataURL("image/png");
 const link = document.createElement('a');
 link.download = 'webar-photo.png';
 link.href = dataURL;
 link.click();
 } catch (err) {
 console.error("Lỗi chụp ảnh:", err);
 }
 }
 }

 // Khi người dùng bấm nút chụp, ta chỉ dựng cờ lên, việc chụp sẽ do hàm render xử lý
 snapBtn.addEventListener('click', () => {
 shouldTakeSnapshot = true;
 });

 init();
 </script>
 </body>
 </html>
