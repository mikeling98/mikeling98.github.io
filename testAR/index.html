<!DOCTYPE html>
 <html lang="vi">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>WebAR - Google Model Viewer</title>
 <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
 <style>
 body { margin: 0; font-family: sans-serif; background: #eceff1; }
 model-viewer { width: 100vw; height: 100vh; }
 .instruction { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; font-size: 14px; pointer-events: none; }
 </style>
 </head>
 <body>

 <div class="instruction">
 Bấm vào biểu tượng AR góc dưới bên phải -> Quét mặt phẳng -> Tự quay/chụp bằng nút của hệ thống.
 </div>

 <model-viewer 
 src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
 ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
 ar 
 ar-modes="scene-viewer quick-look webxr" 
 camera-controls 
 touch-action="none"
 alt="Mô hình AR 3D">
 </model-viewer>

</body>
 </html>
