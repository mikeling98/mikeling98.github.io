<!DOCTYPE html>
 <html lang="vi">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
 <title>WebAR Hoàn Hảo - Quét Mặt Phẳng & Chụp Ảnh Gộp</title>
 <style>
 body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: Arial, sans-serif; }
 #overlay { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 9999; }
 #snap-btn { width: 75px; height: 75px; border-radius: 50%; background: white; border: 5px solid #007bff; cursor: pointer; display: none; }
 #info { position: absolute; top: 10px; width: 100%; text-align: center; color: white; background: rgba(0,0,0,0.7); padding: 8px 0; z-index: 9999; font-size: 13px; }
 </style>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
 </head>
 <body>

 <div id="info">Đang tải hệ thống AR...</div>
 <div id="overlay">
 <button id="snap-btn"></button>
 </div>

 <script type="module">
 import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

 let camera, scene, renderer, reticle;
 let hitTestSource = null;
 let hitTestSourceRequested = false;
 let shouldCapture = false;

 const infoDiv = document.getElementById('info');
 const snapBtn = document.getElementById('snap-btn');

 function init() {
 scene = new THREE.Scene();
 camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

 // Cấu hình gl để không bị trắng/đen màn hình khi chụp
 renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
 renderer.setPixelRatio(window.devicePixelRatio);
 renderer.setSize(window.innerWidth, window.innerHeight);
 renderer.xr.enabled = true;
 document.body.appendChild(renderer.domElement);

 // Khởi tạo nút WebXR gốc, ép giao diện overlay nút chụp đè lên chế độ AR
 const arButton = ARButton.createButton(renderer, { 
 requiredFeatures: ['hit-test'],
 optionalFeatures: ['dom-overlay'],
 domOverlay: { root: document.body }
 });
 document.body.appendChild(arButton);

 arButton.addEventListener('click', () => {
 infoDiv.innerText = "Di chuyển camera chậm để quét sàn nhà/mặt bàn...";
 snapBtn.style.display = 'block';
 });

 // Vòng tròn chỉ thị vị trí mặt phẳng ngoài đời thật
 reticle = new THREE.Mesh(
 new THREE.RingGeometry(0.1, 0.13, 32).rotateX(-Math.PI / 2),
 new THREE.MeshBasicMaterial({ color: 0x00ff00 })
 );
 reticle.matrixAutoUpdate = false;
 reticle.visible = false;
 scene.add(reticle);

 // Thêm ánh sáng
 const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
 scene.add(light);

 // Bắt sự kiện chạm màn hình đặt vật thể
 const controller = renderer.xr.getController(0);
 controller.addEventListener('select', onSelect);
 scene.add(controller);

 renderer.setAnimationLoop(render);
 }

 function onSelect() {
 if (reticle.visible) {
 // Tạo quả cầu đặt cố định xuống mặt đất thực tế
 const geometry = new THREE.SphereGeometry(0.15, 32, 32);
 const material = new THREE.MeshPhongMaterial({ color: 0xffcc00 });
 const mesh = new THREE.Mesh(geometry, material);

 // Gán vị trí thực tế mà bộ lõi ARCore/ARKit quét được cho vật thể
 reticle.matrix.decompose(mesh.position, mesh.quaternion, mesh.scale);
 scene.add(mesh);
 infoDiv.innerText = "Đã đặt vật thể đứng im dưới đất! Nhấn nút để chụp.";
 }
 }

 function render(timestamp, frame) {
 if (frame) {
 const referenceSpace = renderer.xr.getReferenceSpace();
 const session = renderer.xr.getSession();

 if (hitTestSourceRequested === false) {
 session.requestReferenceSpace('viewer').then((viewerSpace) => {
 session.requestHitTestSource({ space: viewerSpace }).then((source) => {
 hitTestSource = source;
 });
 });
 session.xrVertexShader = true;
 hitTestSourceRequested = true;
 }

 if (hitTestSource) {
 const hitTestResults = frame.getHitTestResults(hitTestSource);
 if (hitTestResults.length) {
 const hit = hitTestResults[0];
 reticle.visible = true;
 reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
 } else {
 reticle.visible = false;
 }
 }
 }

 // Tiến hành render vẽ khung cảnh đồ họa
 renderer.render(scene, camera);

 // KỸ THUẬT VƯỢT RÀO: Bắt buộc chụp ảnh ngay cuối phiên render của WebXR
 if (shouldCapture) {
 shouldCapture = false;

 // Tạo canvas trung gian
 const screenshotCanvas = document.createElement('canvas');
 screenshotCanvas.width = renderer.domElement.width;
 screenshotCanvas.height = renderer.domElement.height;
 const ctx = screenshotCanvas.getContext('2d');

 // Vẽ canvas của WebXR (lúc này chứa cả dữ liệu đệm camera hệ thống nếu chạy dom-overlay)
 ctx.drawImage(renderer.domElement, 0, 0);

 screenshotCanvas.toBlob((blob) => {
 if(!blob) return;
 const url = URL.createObjectURL(blob);
 const link = document.createElement('a');
 link.download = 'pokemon_go_webar.png';
 link.href = url;
 link.click();
 URL.revokeObjectURL(url);
 infoDiv.innerText = "Đã lưu ảnh thành công!";
 }, 'image/png');
 }
 }

 snapBtn.addEventListener('click', () => {
 shouldCapture = true;
 });

 init();
 </script>
 </body>
 </html>
