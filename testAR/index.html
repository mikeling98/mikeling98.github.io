<!DOCTYPE html>
 <html lang="vi">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>WebXR Hit-Test & Snapshot Demo</title>
 <style>
 body { margin: 0; overflow: hidden; }
 #ar-button { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; background: #007bff; color: white; border: none; border-radius: 25px; font-size: 16px; z-index: 999; }
 #screenshot-button { position: absolute; bottom: 80px; right: 20px; width: 60px; height: 60px; background: white; border: 3px solid #007bff; border-radius: 50%; display: none; z-index: 999; }
 </style>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
 </head>
 <body>

 <button id="ar-button">Bắt đầu AR</button>
 <button id="screenshot-button"></button>

 <script type="module">
 import { ARButton } from 'https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js';

 let container, camera, scene, renderer;
 let reticle; // Vòng tròn tìm mặt phẳng
 let hitTestSource = null;
 let hitTestSourceRequested = false;

 const arButton = document.getElementById('ar-button');
 const snapButton = document.getElementById('screenshot-button');

 // BƯỚC 1: Khởi tạo Three.js với cấu hình chống nền đen
 function init() {
 scene = new THREE.Scene();
 camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

 // QUAN TRỌNG: preserveDrawingBuffer giúp canvas không bị xóa sau khi vẽ
 renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
 renderer.setPixelRatio(window.devicePixelRatio);
 renderer.setSize(window.innerWidth, window.innerHeight);
 renderer.xr.enabled = true;
 document.body.appendChild(renderer.domElement);

 // Tạo nút vào chế độ AR của trình duyệt
 const webxrButton = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] });
 document.body.appendChild(webxrButton);

 webxrButton.addEventListener('click', () => {
 snapButton.style.display = 'block';
 arButton.style.display = 'none';
 });

 // Tạo vòng tròn chỉ thị để quét mặt phẳng
 reticle = new THREE.Mesh(
 new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
 new THREE.MeshBasicMaterial({ color: 0x00ff00 })
 );
 reticle.matrixAutoUpdate = false;
 reticle.visible = false;
 scene.add(reticle);

 // Thêm ánh sáng và vật thể mẫu (Hình hộp thay cho Pokemon)
 const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
 scene.add(light);

 // Sự kiện chạm màn hình để đặt vật thể vào vị trí vòng tròn chỉ thị
 const controller = renderer.xr.getController(0);
 controller.addEventListener('select', onSelect);
 scene.add(controller);

 renderer.setAnimationLoop(render);
 }

 function onSelect() {
 if (reticle.visible) {
 // Đặt một khối hộp tại vị trí quét được
 const geometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
 const material = new THREE.MeshPhongMaterial({ color: 0xff0000 });
 const mesh = new THREE.Mesh(geometry, material);
 reticle.matrix.decompose(mesh.position, mesh.quaternion, mesh.scale);
 scene.add(mesh);
 }
 }

 // BƯỚC 2: Xử lý tìm mặt phẳng (Hit-Test) ngoài thực tế
 function render(timestamp, frame) {
 if (frame) {
 const referenceSpace = renderer.xr.getReferenceSpace();
 const session = renderer.xr.getSession();

 if (hitTestSourceRequested === false) {
 session.requestReferenceSpace('viewer').then((viewerSpace) => {
 session.requestHitTestSource({ space: viewerSpace }).then((source) => {
 hitTestSource = source;
 });
 });
 session.addEventListener('end', () => {
 hitTestSourceRequested = false;
 hitTestSource = null;
 });
 hitTestSourceRequested = true;
 }

 if (hitTestSource) {
 const hitTestResults = frame.getHitTestResults(hitTestSource);
 if (hitTestResults.length) {
 const hit = hitTestResults[0];
 reticle.visible = true;
 reticle.matrix.fromArray(hit.getPose(referenceSpace).transform.matrix);
 } else {
 reticle.visible = false;
 }
 }
 }
 renderer.render(scene, camera);
 }

 // BƯỚC 3: Xử lý Chụp ảnh (Sửa lỗi nền đen hoàn toàn)
 snapButton.addEventListener('click', () => {
 // Lấy dữ liệu ảnh 3D từ Canvas
 const dataURL = renderer.domElement.toDataURL("image/png");

 // Tạo link ảo để tải ảnh về máy
 const link = document.createElement('a');
 link.download = 'ar-pokemon-photo.png';
 link.href = dataURL;
 link.click();
 alert("Đã chụp! Lưu ý: Trên một số trình duyệt bảo mật cao, ảnh tải về sẽ có nền trong suốt (chỉ thấy vật thể 3D). Hãy dùng Phương pháp 1 hoặc 3 nếu muốn lấy cả nền camera.");
 });

 init();
 </script>
 </body>
 </html>
